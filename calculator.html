<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculator_style.css">
    <!-- Removed inline styles -->
</head>
<body>
    
    <div class="calculator card shadow">
        <div class="card-body p-4">
            <h1 class="text-center h3 mb-4">Calculadora</h1>
            <input type="text" id="display" class="form-control form-control-lg text-end mb-3" value="0" readonly>

            <div class="calculator-buttons">
                <div class="row gx-2 gy-2 mb-2">
                    <div class="col-3"><button class="btn btn-light w-100" id="powerButton">x²</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" id="sqrtButton">√</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" id="percentButton">%</button></div>
                    <div class="col-3"><button class="btn btn-operator w-100" data-operator="/">÷</button></div> 
                </div>
                <div class="row gx-2 gy-2">
                    <div class="col-6"><button class="btn btn-clear w-100" id="clear-all">AC</button></div>
                    <div class="col-3"><button class="btn btn-secondary w-100" id="clear-entry">C</button></div>
                    <!-- Original divide button removed from here -->
                </div>
                <div class="row gx-2 gy-2 mt-2">
                    
                    <div class="col-3"><button class="btn btn-light w-100" data-number="7">7</button></div>
                    <div class="col-3"><button class=" btn btn-light w-100" data-number="8">8</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" data-number="9">9</button></div>
                    <div class="col-3"><button class="btn btn-operator w-100" data-operator="*">×</button></div>
                </div>
                <div class="row gx-2 gy-2 mt-2">
                    
                    <div class="col-3"><button class="btn btn-light w-100" data-number="4">4</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" data-number="5">5</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" data-number="6">6</button></div>
                    <div class="col-3"><button class="btn btn-operator w-100" data-operator="-">−</button></div>
            </div>
                <div class="row gx-2 gy-2 mt-2">
                    
                    <div class="col-3"><button class="btn btn-light w-100" data-number="1">1</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" data-number="2">2</button></div>
                    <div class="col-3"><button class="btn btn-light w-100" data-number="3">3</button></div>
                    <div class="col-3"><button class="btn btn-operator w-100" data-operator="+">+</button></div>
                </div>
                <div class="row gx-2 gy-2 mt-2">
                    
                    <div class="col-6"><button class="btn btn-light w-100" data-number="0">0</button></div>
                    <div class="col-3"><button class="btn btn-secondary w-100" id="decimal">.</button></div>
                    <div class="col-3"><button class="btn btn-equal w-100" id="equals">=</button></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="calculator_script.js"></script>
</body>
</html>
